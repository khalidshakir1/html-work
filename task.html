<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        
        .main-box {
            width: 400px;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            margin: 50px auto;
        }

        .top-row {
            display: flex;
            gap: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
            font-family: Arial, sans-serif;
        }

        .opinion-box {
            width: 100%;
            min-height: 100px;
            resize: vertical; 
        }

        .top-row input {
            flex: 1; 
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div class="top-row">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Profession">
        </div>

        <textarea class="opinion-box" placeholder="Your Opinion / Description..."></textarea>
    </div>

</body>
</html>
